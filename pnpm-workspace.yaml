packages:
  - web
  - packages/*

# pnpm blocks dependency build scripts by default; lefthook's postinstall must
# run for the git hooks to install. Approve the builds we trust.
allowBuilds:
  lefthook: true
  "@biomejs/biome": true
  esbuild: true
  # Pulled in by wrangler (Cloudflare Pages deploy); their build scripts fetch
  # the prebuilt native binaries. Approve them so install is clean.
  sharp: true
  workerd: true
